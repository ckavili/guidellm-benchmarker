{{- if .Values.rbac.create }}
# Role grants permissions needed for the plugin's two operations:
#   1. Benchmark job submission — batch/jobs create/list/watch
#   2. Results viewer auto-provisioning — creates PVC, ConfigMaps, Deployment, Service, Route
# All K8s calls go through the dashboard's /api/k8s/ pass-through using the end-user's
# own Bearer token, so this Role covers what individual users need in their namespace.
# Bind it to users or groups as appropriate for your cluster's RBAC policy.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "guidellm-benchmarker.fullname" . }}
  labels:
    {{- include "guidellm-benchmarker.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "configmaps", "services"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "guidellm-benchmarker.fullname" . }}
  labels:
    {{- include "guidellm-benchmarker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "guidellm-benchmarker.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "guidellm-benchmarker.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
